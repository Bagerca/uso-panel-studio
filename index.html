<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USO | Twitch Panel Studio PRO 3.0</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;500;700;800&family=Rajdhani:wght@600;700&family=Montserrat:wght@700;900&family=Russo+One&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/panel.css">

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

    <aside class="editor-sidebar">
        <div class="sidebar-header">
            <h2>PANEL STUDIO <span>PRO</span></h2>
            <p>Генератор оформления для Twitch</p>
        </div>

        <div class="control-section">
            <label>Быстрые шаблоны</label>
            <div class="preset-grid" id="preset-grid"></div>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active" data-target="tab-layout">Макет</button>
            <button class="tab-btn" data-target="tab-design">Дизайн</button>
            <button class="tab-btn" data-target="tab-text">Текст</button>
        </div>

        <div class="tabs-container">
            <!-- Макет -->
            <div class="tab-pane active" id="tab-layout">
                <div class="control-section">
                    <label>Режим макета</label>
                    <div class="toggle-group" id="ctrl-mode">
                        <button class="toggle-btn" data-val="header">Плашка (Иконка)</button>
                        <button class="toggle-btn" data-val="list">Список (Текст)</button>
                    </div>
                </div>

                <div class="control-section" style="margin-top: 15px;">
                    <label>Ширина баннера: <span id="val-width">320px</span></label>
                    <input type="range" id="ctrl-width" data-state="width" min="200" max="800" step="10">
                </div>

                <div class="control-section" style="margin-top: 15px;">
                    <label>Отступы (Высота): <span id="val-padding">24px</span></label>
                    <input type="range" id="ctrl-padding" data-state="padding" min="10" max="60" step="2">
                </div>
            </div>

            <!-- Дизайн -->
            <div class="tab-pane" id="tab-design">
                <div class="control-row">
                    <div class="control-section">
                        <label>Цвет Акцента</label>
                        <div class="color-picker-group">
                            <input type="color" id="ctrl-color-picker">
                            <input type="text" id="ctrl-color-hex" data-state="accentColor" maxlength="7" spellcheck="false">
                        </div>
                    </div>
                    
                    <div class="control-section" id="icon-group">
                        <label>Иконка</label>
                        <select id="ctrl-icon" data-state="icon">
                            <option value="user">Обо мне</option>
                            <option value="ghost">Мемы / Хоррор</option>
                            <option value="money">Донат / Финансы</option>
                            <option value="discord">Discord</option>
                            <option value="gamepad">Игры / Прайс</option>
                            <option value="rules">Правила</option>
                            <option value="pc">Железо (ПК)</option>
                            <option value="telegram">Telegram</option>
                        </select>
                    </div>
                </div>

                <div class="control-section" style="margin-top: 15px;">
                    <label>Интенсивность неона: <span id="val-glow">100%</span></label>
                    <input type="range" id="ctrl-glow" data-state="glow" min="0" max="200" step="10">
                </div>

                <div class="control-section" style="margin-top: 15px;">
                    <label>Скругление углов: <span id="val-radius">16px</span></label>
                    <input type="range" id="ctrl-radius" data-state="radius" min="0" max="80" step="2">
                </div>
            </div>

            <!-- Текст -->
            <div class="tab-pane" id="tab-text">
                <div class="control-section">
                    <label>Шрифт заголовка</label>
                    <select id="ctrl-font-title" data-state="fontTitle">
                        <option value="'Orbitron', sans-serif">Orbitron (Киберпанк)</option>
                        <option value="'Montserrat', sans-serif">Montserrat (Строгий)</option>
                        <option value="'Russo One', sans-serif">Russo One (Жирный)</option>
                    </select>
                </div>

                <div class="control-section" style="margin-top: 15px;">
                    <label>Главный заголовок</label>
                    <input type="text" id="ctrl-title" data-state="title" autocomplete="off">
                    <div class="range-mini">
                        <label>Размер:</label>
                        <input type="range" id="ctrl-size-title" data-state="sizeTitle" min="16" max="50">
                    </div>
                </div>

                <div class="control-section" style="margin-top: 15px;">
                    <label>Подзаголовок</label>
                    <input type="text" id="ctrl-subtitle" data-state="subtitle" autocomplete="off">
                    <div class="range-mini">
                        <label>Размер:</label>
                        <input type="range" id="ctrl-size-sub" data-state="sizeSub" min="8" max="24">
                    </div>
                </div>

                <div id="body-group" style="margin-top: 15px;">
                    <hr class="divider" style="margin-bottom: 15px;">
                    
                    <div class="control-section">
                        <label>Выравнивание текста</label>
                        <div class="toggle-group" id="ctrl-align">
                            <button class="toggle-btn" data-val="left">Слева</button>
                            <button class="toggle-btn" data-val="center">Центр</button>
                            <button class="toggle-btn" data-val="right">Справа</button>
                        </div>
                    </div>
                    
                    <div class="control-section" style="margin-top: 15px;">
                        <label>Текст (Поддерживает тег &lt;b&gt;)</label>
                        <textarea id="ctrl-body" data-state="body" spellcheck="false" placeholder="Напишите текст..."></textarea>
                    </div>

                    <div class="control-section" style="margin-top: 10px;">
                        <div class="range-mini">
                            <label>Размер:</label>
                            <input type="range" id="ctrl-size-body" data-state="sizeBody" min="10" max="24">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-copy" id="btn-copy">В буфер</button>
            <button class="btn-download" id="btn-download">Скачать PNG</button>
        </div>
    </aside>

    <main class="workspace">
        <div class="workspace-hint">ПРЕВЬЮ (Масштабируется под экран)</div>
        <div class="render-wrapper" id="capture-area">
            
            <div id="render-target" class="panel-layout-header">
                <div class="p-layer-bg">
                    <div class="p-bg-color"></div>
                    <div class="p-stars"></div>
                    <div class="p-glow"></div>
                </div>
                
                <div class="p-layer-content">
                    <div class="p-icon-wrap" id="view-icon-wrap">
                        <div class="p-icon-glow"></div>
                        <svg id="view-icon" viewBox="0 0 24 24"></svg>
                    </div>
                    
                    <div class="p-text-col">
                        <h2 class="p-title" id="view-title">ОБО МНЕ</h2>
                        <p class="p-subtitle" id="view-subtitle">Кто я и почему здесь уютно</p>
                    </div>
                </div>
                
                <div class="p-divider" id="view-divider">
                    <div class="div-line"></div>
                    <div class="div-dot"></div>
                    <div class="div-line"></div>
                </div>
                
                <div class="p-body-text" id="view-body"></div>
            </div>

        </div>
    </main>

    <div id="toast-container"></div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
